syntax = "proto3";

package ggezchain.acl.v1;

import "amino/amino.proto";
import "ggezchain/acl/v1/acl_admin.proto";
import "ggezchain/acl/v1/acl_authority.proto";
import "ggezchain/acl/v1/params.proto";
import "ggezchain/acl/v1/super_admin.proto";
import "gogoproto/gogo.proto";

option go_package = "github.com/GGEZLabs/ggezchain/v2/x/acl/types";

// GenesisState defines the acl module's genesis state.
message GenesisState {
  // params defines all the parameters of the module.
  Params params = 1 [
    (gogoproto.nullable) = false,
    (amino.dont_omitempty) = true
  ];
  repeated AclAdmin acl_admins = 2 [(gogoproto.nullable) = false];
  repeated AclAuthority acl_authorities = 3 [(gogoproto.nullable) = false];
  SuperAdmin super_admin = 4;
}
